version: '3.8'

services:

  # MS1 - Gestión de Usuarios (puerto interno: 3001)
  usuarios:
    image: lpiragauta/biblioteca-usuarios
    environment:
      DB_HOST: usuarios-db
      DB_USER: root
      DB_PASSWORD: Laura
      DB_NAME: usuarios_db
    networks:
      - biblioteca-net
    deploy:
      replicas: 3
      endpoint_mode: dnsrr
      placement:
        constraints:
          - node.role == worker
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
      update_config:
        parallelism: 1
        delay: 10s

  usuarios-db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: Laura
      MYSQL_DATABASE: usuarios_db
    volumes:
      - usuarios-db-data:/var/lib/mysql
    configs:
      - source: sql_usuarios
        target: /docker-entrypoint-initdb.d/init.sql
    networks:
      - biblioteca-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pLaura"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 150s
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure

  # MS2 - Gestión de Libros (puerto interno: 3002)
  libros:
    image: lpiragauta/biblioteca-libros
    environment:
      DB_HOST: libros-db
      DB_USER: root
      DB_PASSWORD: Laura
      DB_NAME: libros_db
    networks:
      - biblioteca-net
    deploy:
      replicas: 3
      endpoint_mode: dnsrr
      placement:
        constraints:
          - node.role == worker
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
      update_config:
        parallelism: 1
        delay: 10s

  libros-db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: Laura
      MYSQL_DATABASE: libros_db
    volumes:
      - libros-db-data:/var/lib/mysql
    configs:
      - source: sql_libros
        target: /docker-entrypoint-initdb.d/init.sql
    networks:
      - biblioteca-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pLaura"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 150s
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure

  # MS3 - Gestión de Préstamos (puerto interno: 3003)
  prestamos:
    image: lpiragauta/biblioteca-prestamos
    environment:
      DB_HOST: prestamos-db
      DB_USER: root
      DB_PASSWORD: Laura
      DB_NAME: prestamos_db
      MS1_URL: http://usuarios:3001
      MS2_URL: http://libros:3002
    networks:
      - biblioteca-net
    deploy:
      replicas: 3
      endpoint_mode: dnsrr
      placement:
        constraints:
          - node.role == worker
      restart_policy:
        condition: on-failure
        delay: 15s
        max_attempts: 5
      update_config:
        parallelism: 1
        delay: 10s

  prestamos-db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: Laura
      MYSQL_DATABASE: prestamos_db
    volumes:
      - prestamos-db-data:/var/lib/mysql
    configs:
      - source: sql_prestamos
        target: /docker-entrypoint-initdb.d/init.sql
    networks:
      - biblioteca-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pLaura"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 150s
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure

  # HAProxy - Proxy inverso (manager)
  haproxy:
    image: haproxy:2.9-alpine
    ports:
      - target: 80
        published: 8080
        protocol: tcp
        mode: host
      - target: 8404
        published: 8404
        protocol: tcp
        mode: host
    configs:
      - source: haproxy_cfg
        target: /usr/local/etc/haproxy/haproxy.cfg
    networks:
      - biblioteca-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure

  # Frontend - Nginx (worker)
  frontend:
    image: lpiragauta/biblioteca-frontend
    ports:
      - target: 80
        published: 80
        protocol: tcp
        mode: host
    networks:
      - biblioteca-net
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == worker
      restart_policy:
        condition: on-failure

# Configuraciones
configs:
  haproxy_cfg:
    file: ./haproxy/haproxy.cfg
  sql_usuarios:
    file: ./usuarios/sql/init.sql
  sql_libros:
    file: ./libros/sql/init.sql
  sql_prestamos:
    file: ./prestamos/sql/init.sql

# Volúmenes persistentes
volumes:
  usuarios-db-data:
    driver: local
  libros-db-data:
    driver: local
  prestamos-db-data:
    driver: local

# Red overlay compartida entre todos los nodos del Swarm
networks:
  biblioteca-net:
    driver: overlay
    attachable: true
