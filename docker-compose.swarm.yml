version: '3.8'

networks:
  biblioteca-net:
    driver: overlay
    attachable: true

volumes:
  mysql_data:

services:

  # =========================
  # Base de Datos MySQL
  # =========================
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: Laura
    volumes:
      - mysql_data:/var/lib/mysql
      - /vagrant/microservicios/microservicios.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - biblioteca-net
    deploy:
      replicas: 1
      placement:
        constraints: [node.role == manager]
      restart_policy:
        condition: on-failure
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pLaura"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =========================
  # Microservicio Usuarios (puerto interno: 3001)
  # =========================
  usuarios:
    image: lpiragauta/biblioteca-usuarios:latest
    environment:
      DB_HOST: mysql
      DB_USER: root
      DB_PASSWORD: Laura
      DB_NAME: usuarios_db
    networks:
      - biblioteca-net
    deploy:
      replicas: 3
      endpoint_mode: dnsrr
      placement:
        constraints: [node.role == worker]
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
      update_config:
        parallelism: 1
        delay: 10s

  # =========================
  # Microservicio Libros (puerto interno: 3002)
  # =========================
  libros:
    image: lpiragauta/biblioteca-libros:latest
    environment:
      DB_HOST: mysql
      DB_USER: root
      DB_PASSWORD: Laura
      DB_NAME: libros_db
    networks:
      - biblioteca-net
    deploy:
      replicas: 3
      endpoint_mode: dnsrr
      placement:
        constraints: [node.role == worker]
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
      update_config:
        parallelism: 1
        delay: 10s

  # =========================
  # Microservicio Préstamos (puerto interno: 3003)
  # =========================
  prestamos:
    image: lpiragauta/biblioteca-prestamos:latest
    environment:
      DB_HOST: mysql
      DB_USER: root
      DB_PASSWORD: Laura
      DB_NAME: prestamos_db
      MS1_URL: http://usuarios:3001
      MS2_URL: http://libros:3002
    networks:
      - biblioteca-net
    deploy:
      replicas: 3
      endpoint_mode: dnsrr
      placement:
        constraints: [node.role == worker]
      restart_policy:
        condition: on-failure
        delay: 15s
        max_attempts: 5
      update_config:
        parallelism: 1
        delay: 10s

  # =========================
  # Microservicio Admin (puerto interno: 3004)
  # =========================
  admin:
    image: lpiragauta/biblioteca-admin:latest
    environment:
      DB_HOST: mysql
      DB_USER: root
      DB_PASSWORD: Laura
      DB_NAME: admin_db
    networks:
      - biblioteca-net
    deploy:
      replicas: 1
      endpoint_mode: dnsrr
      placement:
        constraints: [node.role == worker]
      restart_policy:
        condition: on-failure

  # =========================
  # Balanceador HAProxy
  # Punto de entrada único para las APIs (/api/*)
  # Puerto 80 → enrutamiento por ruta hacia MS
  # Puerto 8404 → dashboard de estadísticas
  # =========================
  haproxy:
    image: haproxy:2.9-alpine
    ports:
      - target: 80
        published: 80
        protocol: tcp
        mode: host
      - target: 8404
        published: 8404
        protocol: tcp
        mode: host
    volumes:
      - /vagrant/microservicios/haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    networks:
      - biblioteca-net
    deploy:
      replicas: 1
      placement:
        constraints: [node.role == manager]
      restart_policy:
        condition: on-failure

  # =========================
  # Frontend Nginx
  # Sirve los archivos estáticos HTML/JS
  # Puerto 8080 en el host
  # =========================
  frontend:
    image: lpiragauta/biblioteca-frontend:latest
    ports:
      - target: 80
        published: 8080
        protocol: tcp
        mode: ingress
    networks:
      - biblioteca-net
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
