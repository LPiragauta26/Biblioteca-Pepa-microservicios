<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Insertar Libro - Biblioteca</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f4f8; font-family: Arial, sans-serif; }
        .navbar { background-color: #0d2137; }
        .navbar-brand { color: #c8a96e !important; font-weight: bold; }
        .nav-link { color: #89b4d8 !important; }
        .nav-link:hover { color: #c8a96e !important; }
        .header-section { background-color: #0d2137; padding: 30px 20px; text-align: center; border-bottom: 2px solid #1a3a5c; }
        .header-section h2 { color: #c8a96e; font-size: 24px; }
        .header-section p { color: #89b4d8; font-size: 13px; margin: 0; }
        .card-form { background: white; border-radius: 12px; border: 1px solid #dee2e6; padding: 30px; }
        .section-label { font-size: 12px; font-weight: bold; color: #6c757d; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 2px solid #0d2137; }
        .form-label { font-size: 14px; font-weight: bold; color: #0d2137; }
        .form-control:focus { border-color: #0d2137; box-shadow: 0 0 0 0.2rem rgba(13,33,55,0.15); }
        .btn-guardar { background-color: #0d2137; color: #c8a96e; border: none; padding: 10px 30px; border-radius: 8px; font-weight: bold; }
        .btn-guardar:hover { background-color: #1a3a5c; color: #c8a96e; }
        .footer { text-align: center; padding: 20px; font-size: 12px; color: #6c757d; border-top: 1px solid #dee2e6; margin-top: 30px; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="../index.html">📚 Biblioteca</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="ver_libros.html">Ver Libros</a></li>
                    <li class="nav-item"><a class="nav-link" href="insertar_libros.html">Insertar</a></li>
                    <li class="nav-item"><a class="nav-link" href="consultar_libros.html">Consultar</a></li>
                    <li class="nav-item"><a class="nav-link" href="editar_libros.html">Editar</a></li>
                    <li class="nav-item"><a class="nav-link" href="borrar_libros.html">Eliminar</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="header-section">
        <div style="font-size: 40px; margin-bottom: 10px;">➕</div>
        <h2>Insertar Nuevo Libro</h2>
        <p>Completa los datos para registrar un libro</p>
    </div>

    <div class="container mt-4">
        <div class="card-form">

            <div class="section-label">📗 Datos del Libro</div>
            <div class="row mb-3">
                <div class="col-md-4 mb-3">
                    <label class="form-label">Código</label>
                    <input type="text" class="form-control" id="codigo" placeholder="Ej: L001" required />
                </div>
                <div class="col-md-8 mb-3">
                    <label class="form-label">Título</label>
                    <input type="text" class="form-control" id="titulo" placeholder="Ej: Cien años de soledad" required />
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Autor</label>
                    <input type="text" class="form-control" id="autor" placeholder="Ej: Gabriel García Márquez" required />
                </div>
                <div class="col-md-3 mb-3">
                    <label class="form-label">Género</label>
                    <input type="text" class="form-control" id="genero" placeholder="Ej: Novela" required />
                </div>
                <div class="col-md-3 mb-3">
                    <label class="form-label">Cantidad</label>
                    <input type="number" class="form-control" id="cantidad_disponible" placeholder="Ej: 5" min="0" required />
                </div>
            </div>

            <div class="d-flex gap-2 mt-2">
                <button onclick="guardarLibro()" class="btn-guardar btn">💾 Guardar Libro</button>
                <a href="index.html" class="btn btn-secondary">← Volver</a>
            </div>

            <div id="mensaje" class="alert mt-4 d-none"></div>

        </div>
    </div>

    <div class="footer">
        Aplicación desarrollada para el curso de Redes e Infraestructura 2026
    </div>

    <script>
        function guardarLibro() {
            const codigo = document.getElementById('codigo').value;
            const titulo = document.getElementById('titulo').value;
            const autor = document.getElementById('autor').value;
            const genero = document.getElementById('genero').value;
            const cantidad = document.getElementById('cantidad_disponible').value;

            if (!codigo || !titulo || !autor || !genero || cantidad === '') {
                const mensaje = document.getElementById('mensaje');
                mensaje.classList.remove('d-none', 'alert-success');
                mensaje.classList.add('alert-danger');
                mensaje.textContent = 'Por favor completa todos los campos';
                return;
            }

            fetch('' + API_LIBROS + '/libros', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ codigo, titulo, autor, genero, cantidad_disponible: parseInt(cantidad) })
            })
            .then(response => response.json())
            .then(data => {
                const mensaje = document.getElementById('mensaje');
                mensaje.classList.remove('d-none', 'alert-danger');
                mensaje.classList.add('alert-success');
                mensaje.textContent = '✅ Libro registrado con éxito';
                document.getElementById('codigo').value = '';
                document.getElementById('titulo').value = '';
                document.getElementById('autor').value = '';
                document.getElementById('genero').value = '';
                document.getElementById('cantidad_disponible').value = '';
            })
            .catch(error => {
                const mensaje = document.getElementById('mensaje');
                mensaje.classList.remove('d-none', 'alert-success');
                mensaje.classList.add('alert-danger');
                mensaje.textContent = '❌ Error al registrar el libro';
            });
        }
    </script>

<script src="../config.js"></script>
</body>
</html>
