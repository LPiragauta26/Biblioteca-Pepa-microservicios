<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Editar Libro - Biblioteca</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f4f8; font-family: Arial, sans-serif; }
        .navbar { background-color: #0d2137; }
        .navbar-brand { color: #c8a96e !important; font-weight: bold; }
        .nav-link { color: #89b4d8 !important; }
        .nav-link:hover { color: #c8a96e !important; }
        .header-section { background-color: #0d2137; padding: 30px 20px; text-align: center; border-bottom: 2px solid #1a3a5c; }
        .header-section h2 { color: #c8a96e; font-size: 24px; }
        .header-section p { color: #89b4d8; font-size: 13px; margin: 0; }
        .card-form { background: white; border-radius: 12px; border: 1px solid #dee2e6; padding: 30px; }
        .section-label { font-size: 12px; font-weight: bold; color: #6c757d; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 2px solid #854f0b; }
        .form-label { font-size: 14px; font-weight: bold; color: #0d2137; }
        .form-control:focus { border-color: #0d2137; box-shadow: 0 0 0 0.2rem rgba(13,33,55,0.15); }
        .btn-buscar { background-color: #0d2137; color: #c8a96e; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; }
        .btn-buscar:hover { background-color: #1a3a5c; color: #c8a96e; }
        .btn-guardar { background-color: #854f0b; color: white; border: none; padding: 10px 30px; border-radius: 8px; font-weight: bold; }
        .btn-guardar:hover { background-color: #633806; color: white; }
        .footer { text-align: center; padding: 20px; font-size: 12px; color: #6c757d; border-top: 1px solid #dee2e6; margin-top: 30px; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="../index.html">📚 Biblioteca</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="ver_libros.html">Ver Libros</a></li>
                    <li class="nav-item"><a class="nav-link" href="insertar_libros.html">Insertar</a></li>
                    <li class="nav-item"><a class="nav-link" href="consultar_libros.html">Consultar</a></li>
                    <li class="nav-item"><a class="nav-link" href="editar_libros.html">Editar</a></li>
                    <li class="nav-item"><a class="nav-link" href="borrar_libros.html">Eliminar</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="header-section">
        <div style="font-size: 40px; margin-bottom: 10px;">✏️</div>
        <h2>Editar Libro</h2>
        <p>Busca el libro por código y modifica sus datos</p>
    </div>

    <div class="container mt-4">

        <div class="card-form mb-4">
            <div class="section-label">🔎 Buscar Libro</div>
            <div class="d-flex gap-2">
                <input type="text" class="form-control" id="buscar-codigo" placeholder="Ingresa el código del libro" />
                <button onclick="buscarLibro()" class="btn-buscar btn">Buscar</button>
            </div>
            <div id="mensaje-buscar" class="alert mt-3 d-none"></div>
        </div>

        <div class="card-form d-none" id="form-editar">

            <div class="section-label">📗 Datos del Libro</div>
            <div class="row mb-3">
                <div class="col-md-4 mb-3">
                    <label class="form-label">Código</label>
                    <input type="text" class="form-control" id="codigo" disabled />
                </div>
                <div class="col-md-8 mb-3">
                    <label class="form-label">Título</label>
                    <input type="text" class="form-control" id="titulo" />
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Autor</label>
                    <input type="text" class="form-control" id="autor" />
                </div>
                <div class="col-md-3 mb-3">
                    <label class="form-label">Género</label>
                    <input type="text" class="form-control" id="genero" />
                </div>
                <div class="col-md-3 mb-3">
                    <label class="form-label">Cantidad</label>
                    <input type="number" class="form-control" id="cantidad_disponible" min="0" />
                </div>
            </div>

            <div class="d-flex gap-2 mt-2">
                <button onclick="guardarCambios()" class="btn-guardar btn">💾 Guardar Cambios</button>
                <a href="index.html" class="btn btn-secondary">← Volver</a>
            </div>

            <div id="mensaje-guardar" class="alert mt-4 d-none"></div>
        </div>
    </div>

    <div class="footer">
        Aplicación desarrollada para el curso de Redes e Infraestructura 2026
    </div>

    <script src="../config.js"></script>
    <script>
        let codigoActual = null;

        function buscarLibro() {
            const codigo = document.getElementById('buscar-codigo').value;
            const mensajeBuscar = document.getElementById('mensaje-buscar');

            if (!codigo) {
                mensajeBuscar.classList.remove('d-none', 'alert-success');
                mensajeBuscar.classList.add('alert-danger');
                mensajeBuscar.textContent = 'Por favor ingresa un código';
                return;
            }

            fetch('' + API_LIBROS + '/libros/' + codigo)
                .then(response => response.json())
                .then(data => {
                    if (data.error) {
                        mensajeBuscar.classList.remove('d-none', 'alert-success');
                        mensajeBuscar.classList.add('alert-danger');
                        mensajeBuscar.textContent = '❌ Libro no encontrado';
                        document.getElementById('form-editar').classList.add('d-none');
                        return;
                    }

                    codigoActual = data.codigo;
                    document.getElementById('codigo').value = data.codigo;
                    document.getElementById('titulo').value = data.titulo;
                    document.getElementById('autor').value = data.autor;
                    document.getElementById('genero').value = data.genero;
                    document.getElementById('cantidad_disponible').value = data.cantidad_disponible;

                    mensajeBuscar.classList.add('d-none');
                    document.getElementById('form-editar').classList.remove('d-none');
                })
                .catch(error => {
                    mensajeBuscar.classList.remove('d-none', 'alert-success');
                    mensajeBuscar.classList.add('alert-danger');
                    mensajeBuscar.textContent = '❌ Error al buscar el libro';
                });
        }

        function guardarCambios() {
            const titulo = document.getElementById('titulo').value;
            const autor = document.getElementById('autor').value;
            const genero = document.getElementById('genero').value;
            const cantidad = document.getElementById('cantidad_disponible').value;

            fetch('' + API_LIBROS + '/libros/' + codigoActual, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ titulo, autor, genero, cantidad_disponible: parseInt(cantidad) })
            })
            .then(response => response.json())
            .then(data => {
                const mensaje = document.getElementById('mensaje-guardar');
                mensaje.classList.remove('d-none', 'alert-danger');
                mensaje.classList.add('alert-success');
                mensaje.textContent = '✅ Libro actualizado con éxito';
            })
            .catch(error => {
                const mensaje = document.getElementById('mensaje-guardar');
                mensaje.classList.remove('d-none', 'alert-success');
                mensaje.classList.add('alert-danger');
                mensaje.textContent = '❌ Error al actualizar el libro';
            });
        }
    </script>


</body>
</html>
