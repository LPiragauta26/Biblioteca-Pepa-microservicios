<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Ver Libros - Biblioteca</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f4f8; font-family: Arial, sans-serif; }
        .navbar { background-color: #0d2137; }
        .navbar-brand { color: #c8a96e !important; font-weight: bold; }
        .nav-link { color: #89b4d8 !important; }
        .nav-link:hover { color: #c8a96e !important; }
        .header-section { background-color: #0d2137; padding: 30px 20px; text-align: center; border-bottom: 2px solid #1a3a5c; }
        .header-section h2 { color: #c8a96e; font-size: 24px; }
        .header-section p { color: #89b4d8; font-size: 13px; margin: 0; }
        .badge-disponible { background-color: #3b6d11; color: white; padding: 4px 10px; border-radius: 20px; font-size: 12px; }
        .badge-agotado { background-color: #a32d2d; color: white; padding: 4px 10px; border-radius: 20px; font-size: 12px; }
        .badge-genero { background-color: #0d2137; color: #c8a96e; padding: 4px 10px; border-radius: 20px; font-size: 12px; }
        .card-libro { background: white; border-radius: 10px; border: 1px solid #dee2e6; padding: 16px; margin-bottom: 12px; border-left: 4px solid #0d2137; }
        .card-libro.agotado { border-left-color: #a32d2d; }
        .card-libro .titulo { font-size: 15px; font-weight: bold; color: #0d2137; margin-bottom: 4px; }
        .card-libro .subtitulo { font-size: 13px; color: #6c757d; margin-bottom: 8px; }
        .card-libro .detalle { font-size: 13px; color: #444; }
        .footer { text-align: center; padding: 20px; font-size: 12px; color: #6c757d; border-top: 1px solid #dee2e6; margin-top: 30px; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="../index.html">📚 Biblioteca</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="ver_libros.html">Ver Libros</a></li>
                    <li class="nav-item"><a class="nav-link" href="insertar_libros.html">Insertar</a></li>
                    <li class="nav-item"><a class="nav-link" href="consultar_libros.html">Consultar</a></li>
                    <li class="nav-item"><a class="nav-link" href="editar_libros.html">Editar</a></li>
                    <li class="nav-item"><a class="nav-link" href="borrar_libros.html">Eliminar</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="header-section">
        <div style="font-size: 40px; margin-bottom: 10px;">📋</div>
        <h2>Lista de Libros</h2>
        <p>Todos los libros registrados en el sistema</p>
    </div>

    <div class="container mt-4">

        <div class="row mb-4" id="resumen"></div>

        <div id="libros-lista"></div>

        <div id="mensaje-vacio" class="text-center text-muted py-4 d-none">
            <div style="font-size: 40px;">📭</div>
            <p>No hay libros registrados aún.</p>
        </div>

        <div class="text-center mt-3">
            <a href="index.html" class="btn btn-secondary">← Volver al inicio</a>
        </div>
    </div>

    <div class="footer">
        Aplicación desarrollada para el curso de Redes e Infraestructura 2026
    </div>

    <script>
        fetch('' + API_LIBROS + '/libros')
            .then(response => response.json())
            .then(data => {
                const lista = document.getElementById('libros-lista');
                const mensajeVacio = document.getElementById('mensaje-vacio');
                const resumen = document.getElementById('resumen');

                if (data.length === 0) {
                    mensajeVacio.classList.remove('d-none');
                    return;
                }

                const total = data.length;
                const disponibles = data.filter(l => l.cantidad_disponible > 0).length;
                const agotados = data.filter(l => l.cantidad_disponible === 0).length;

                resumen.innerHTML = `
                    <div class="col-md-4 mb-2">
                        <div class="text-center p-3 bg-white rounded border">
                            <div style="font-size:24px; font-weight:bold; color:#185fa5;">${total}</div>
                            <div style="font-size:13px; color:#6c757d;">Total libros</div>
                        </div>
                    </div>
                    <div class="col-md-4 mb-2">
                        <div class="text-center p-3 bg-white rounded border">
                            <div style="font-size:24px; font-weight:bold; color:#3b6d11;">${disponibles}</div>
                            <div style="font-size:13px; color:#6c757d;">Disponibles</div>
                        </div>
                    </div>
                    <div class="col-md-4 mb-2">
                        <div class="text-center p-3 bg-white rounded border">
                            <div style="font-size:24px; font-weight:bold; color:#a32d2d;">${agotados}</div>
                            <div style="font-size:13px; color:#6c757d;">Agotados</div>
                        </div>
                    </div>
                `;

                data.forEach(libro => {
                    const disponible = libro.cantidad_disponible > 0;
                    const badgeEstado = disponible
                        ? `<span class="badge-disponible">Disponible</span>`
                        : `<span class="badge-agotado">Agotado</span>`;
                    const claseCard = disponible ? '' : 'agotado';

                    const card = document.createElement('div');
                    card.className = `card-libro ${claseCard}`;
                    card.innerHTML = `
                        <div class="d-flex justify-content-between align-items-start mb-2">
                            <div>
                                <div class="titulo">📗 ${libro.titulo}</div>
                                <div class="subtitulo">Código: ${libro.codigo} &nbsp;|&nbsp; <span class="badge-genero">${libro.genero}</span></div>
                            </div>
                            <div>${badgeEstado}</div>
                        </div>
                        <div class="row detalle">
                            <div class="col-md-6">
                                <strong>✍️ Autor:</strong> ${libro.autor}
                            </div>
                            <div class="col-md-6 text-md-end">
                                <strong>📦 Cantidad disponible:</strong> ${libro.cantidad_disponible}
                            </div>
                        </div>
                    `;
                    lista.appendChild(card);
                });
            })
            .catch(error => {
                console.error('Error:', error);
            });
    </script>

<script src="../config.js"></script>
</body>
</html>
