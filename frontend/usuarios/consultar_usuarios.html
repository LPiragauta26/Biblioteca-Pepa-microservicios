<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Consultar Usuario - Biblioteca</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f4f8; font-family: Arial, sans-serif; }
        .navbar { background-color: #0d2137; }
        .navbar-brand { color: #c8a96e !important; font-weight: bold; }
        .nav-link { color: #89b4d8 !important; }
        .header-section { background-color: #0d2137; padding: 30px 20px; text-align: center; border-bottom: 2px solid #1a3a5c; }
        .header-section h2 { color: #c8a96e; font-size: 24px; }
        .header-section p { color: #89b4d8; font-size: 13px; margin: 0; }
        .card-form { background: white; border-radius: 12px; border: 1px solid #dee2e6; padding: 30px; }
        .section-label { font-size: 12px; font-weight: bold; color: #6c757d; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 2px solid #185fa5; }
        .form-label { font-size: 14px; font-weight: bold; color: #0d2137; }
        .btn-buscar { background-color: #0d2137; color: #c8a96e; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; }
        .dato-label { font-size: 12px; color: #6c757d; margin-bottom: 2px; }
        .dato-valor { font-size: 15px; font-weight: bold; color: #0d2137; margin-bottom: 12px; }
        .resultado-card { background: white; border-radius: 12px; border: 1px solid #dee2e6; padding: 24px; border-left: 4px solid #185fa5; }
        .footer { text-align: center; padding: 20px; font-size: 12px; color: #6c757d; border-top: 1px solid #dee2e6; margin-top: 30px; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand" href="../index.html">📚 Biblioteca</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="ver_usuarios.html">Ver</a></li>
                <li class="nav-item"><a class="nav-link" href="insertar_usuarios.html">Insertar</a></li>
                <li class="nav-item"><a class="nav-link" href="consultar_usuarios.html">Consultar</a></li>
                <li class="nav-item"><a class="nav-link" href="editar_usuarios.html">Editar</a></li>
                <li class="nav-item"><a class="nav-link" href="borrar_usuarios.html">Eliminar</a></li>
            </ul>
        </div>
    </div>
</nav>
<div class="header-section">
    <div style="font-size:40px;margin-bottom:10px;">🔍</div>
    <h2>Consultar Usuario</h2>
    <p>Busca un usuario por su nombre de usuario</p>
</div>
<div class="container mt-4">
    <div id="alerta"></div>
    <div class="card-form mb-4">
        <div class="section-label">🔎 Buscar Usuario</div>
        <div class="d-flex gap-2">
            <input type="text" class="form-control" id="buscar" placeholder="Ej: juan.perez1">
            <button onclick="consultar()" class="btn-buscar btn">Buscar</button>
        </div>
    </div>
    <div class="resultado-card d-none" id="resultado">
        <div class="row">
            <div class="col-md-6"><div class="dato-label">Usuario</div><div class="dato-valor" id="r-usuario"></div></div>
            <div class="col-md-6"><div class="dato-label">Correo</div><div class="dato-valor" id="r-correo"></div></div>
            <div class="col-md-6"><div class="dato-label">Nombre</div><div class="dato-valor" id="r-nombre"></div></div>
            <div class="col-md-6"><div class="dato-label">Apellido</div><div class="dato-valor" id="r-apellido"></div></div>
            <div class="col-md-6"><div class="dato-label">Teléfono</div><div class="dato-valor" id="r-telefono"></div></div>
            <div class="col-md-6"><div class="dato-label">Fecha Registro</div><div class="dato-valor" id="r-fecha"></div></div>
            <div class="col-md-6"><div class="dato-label">Estado</div><div class="dato-valor" id="r-estado"></div></div>
            <div class="col-md-6"><div class="dato-label">Rol</div><div class="dato-valor" id="r-rol"></div></div>
        </div>
    </div>
</div>
<div class="footer">Aplicación desarrollada para el curso de Redes e Infraestructura 2026</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../config.js"></script>
<script>
    function consultar() {
        const u = document.getElementById("buscar").value.trim();
        if (!u) { showAlert("Ingresa un nombre de usuario", "warning"); return; }
        fetch(API_USUARIOS + "/usuarios/" + u)
            .then(r => { if (!r.ok) throw new Error(); return r.json(); })
            .then(d => {
                document.getElementById("r-usuario").textContent = d.usuario || "-";
                document.getElementById("r-correo").textContent = d.correo || "-";
                document.getElementById("r-nombre").textContent = d.nombre || "-";
                document.getElementById("r-apellido").textContent = d.apellido || "-";
                document.getElementById("r-telefono").textContent = d.telefono || "-";
                document.getElementById("r-fecha").textContent = d.fecha_registro ? d.fecha_registro.substring(0,10) : "-";
                document.getElementById("r-estado").textContent = d.estado || "-";
                document.getElementById("r-rol").textContent = d.rol || "-";
                document.getElementById("resultado").classList.remove("d-none");
                document.getElementById("alerta").innerHTML = "";
            })
            .catch(() => { document.getElementById("resultado").classList.add("d-none"); showAlert("❌ Usuario no encontrado", "danger"); });
    }
    function showAlert(msg, tipo) {
        document.getElementById("alerta").innerHTML = "<div class=\"alert alert-" + tipo + " alert-dismissible\">" + msg + "<button type=\"button\" class=\"btn-close\" data-bs-dismiss=\"alert\"></button></div>";
    }
</script>
</body>
</html>
