<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Insertar Usuario - Biblioteca</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f4f8; font-family: Arial, sans-serif; }
        .navbar { background-color: #0d2137; }
        .navbar-brand { color: #c8a96e !important; font-weight: bold; }
        .nav-link { color: #89b4d8 !important; }
        .nav-link:hover { color: #c8a96e !important; }
        .header-section { background-color: #0d2137; padding: 30px 20px; text-align: center; border-bottom: 2px solid #1a3a5c; }
        .header-section h2 { color: #c8a96e; font-size: 24px; }
        .header-section p { color: #89b4d8; font-size: 13px; margin: 0; }
        .card-form { background: white; border-radius: 12px; border: 1px solid #dee2e6; padding: 30px; }
        .section-label { font-size: 12px; font-weight: bold; color: #6c757d; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 2px solid #185fa5; }
        .form-label { font-size: 14px; font-weight: bold; color: #0d2137; }
        .form-control:focus { border-color: #0d2137; box-shadow: 0 0 0 0.2rem rgba(13,33,55,0.15); }
        .btn-buscar { background-color: #0d2137; color: #c8a96e; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-buscar:hover { background-color: #1a3a5c; color: #c8a96e; }
        .btn-guardar { background-color: #185fa5; color: white; border: none; padding: 10px 30px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-guardar:hover { background-color: #0d4a8a; }
        .btn-editar { background-color: #854f0b; color: white; border: none; padding: 10px 30px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-editar:hover { background-color: #633806; }
        .btn-eliminar { background-color: #a32d2d; color: white; border: none; padding: 10px 30px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-eliminar:hover { background-color: #791f1f; }
        .dato-label { font-size: 12px; color: #6c757d; margin-bottom: 2px; }
        .dato-valor { font-size: 15px; font-weight: bold; color: #0d2137; margin-bottom: 12px; }
        .resultado-card { background: white; border-radius: 12px; border: 1px solid #dee2e6; padding: 24px; border-left: 4px solid #185fa5; }
        .alerta-eliminar { background-color: #fcebeb; border: 1px solid #f7c1c1; border-radius: 10px; padding: 16px; margin-top: 16px; }
        .footer { text-align: center; padding: 20px; font-size: 12px; color: #6c757d; border-top: 1px solid #dee2e6; margin-top: 30px; }
</style>
</head>
<body>

<nav class="navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand" href="../index.html">📚 Biblioteca</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="index.html">← Inicio</a></li>
                <li class="nav-item"><a class="nav-link" href="ver_usuarios.html">Ver</a></li>
                <li class="nav-item"><a class="nav-link" href="insertar_usuarios.html">Insertar</a></li>
                <li class="nav-item"><a class="nav-link" href="consultar_usuarios.html">Consultar</a></li>
                <li class="nav-item"><a class="nav-link" href="editar_usuarios.html">Editar</a></li>
                <li class="nav-item"><a class="nav-link" href="borrar_usuarios.html">Eliminar</a></li>
            </ul>
        </div>
    </div>
</nav>
<div class="header-section"><div style="font-size:40px;margin-bottom:10px;">➕</div><h2>Insertar Usuario</h2><p>Registrar un nuevo usuario en el sistema</p></div>
<div class="container mt-4">
    <div id="alerta"></div>
    <div class="card-form">
        <div class="section-label">👤 Datos del Usuario</div>
        <div class="row">
            <div class="col-md-6 mb-3"><label class="form-label">Nombre completo</label><input type="text" class="form-control" id="nombre" placeholder="Ej: María García"></div>
            <div class="col-md-6 mb-3"><label class="form-label">Email</label><input type="email" class="form-control" id="email" placeholder="correo@ejemplo.com"></div>
            <div class="col-md-6 mb-3"><label class="form-label">Usuario</label><input type="text" class="form-control" id="usuario" placeholder="nombre_usuario"></div>
            <div class="col-md-6 mb-3"><label class="form-label">Password</label><input type="password" class="form-control" id="password" placeholder="••••••••"></div>
        </div>
        <div class="d-flex gap-2 mt-2">
            <button onclick="guardar()" class="btn-guardar btn">💾 Guardar Usuario</button>
            <a href="index.html" class="btn btn-secondary">← Volver</a>
        </div>
    </div>
</div>
<div class="footer">Aplicación desarrollada para el curso de Redes e Infraestructura 2026</div>
<script src="../config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function guardar() {
        const nombre=document.getElementById('nombre').value, email=document.getElementById('email').value,
              usuario=document.getElementById('usuario').value, password=document.getElementById('password').value;
        if (!nombre||!email||!usuario||!password) { showAlert('Completa todos los campos','danger'); return; }
        fetch(API_USUARIOS + '/usuarios', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({nombre,email,usuario,password})})
        .then(r=>r.json().then(d=>{if(r.ok){showAlert('✅ Usuario creado con éxito','success');['nombre','email','usuario','password'].forEach(id=>document.getElementById(id).value='');}else{showAlert('❌ '+(d.error||'Error al crear'),'danger');}}) )
        .catch(()=>showAlert('❌ No se pudo conectar con el microservicio de usuarios','danger'));
    }
    function showAlert(msg,tipo){document.getElementById('alerta').innerHTML=`<div class="alert alert-${tipo} alert-dismissible">${msg}<button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>`;}
</script>
</body></html>
