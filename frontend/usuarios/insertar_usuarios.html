<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Insertar Usuario - Biblioteca</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f4f8; font-family: Arial, sans-serif; }
        .navbar { background-color: #0d2137; }
        .navbar-brand { color: #c8a96e !important; font-weight: bold; }
        .nav-link { color: #89b4d8 !important; }
        .header-section { background-color: #0d2137; padding: 30px 20px; text-align: center; border-bottom: 2px solid #1a3a5c; }
        .header-section h2 { color: #c8a96e; font-size: 24px; }
        .header-section p { color: #89b4d8; font-size: 13px; margin: 0; }
        .card-form { background: white; border-radius: 12px; border: 1px solid #dee2e6; padding: 30px; }
        .section-label { font-size: 12px; font-weight: bold; color: #6c757d; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 2px solid #185fa5; }
        .form-label { font-size: 14px; font-weight: bold; color: #0d2137; }
        .btn-guardar { background-color: #185fa5; color: white; border: none; padding: 10px 30px; border-radius: 8px; font-weight: bold; }
        .footer { text-align: center; padding: 20px; font-size: 12px; color: #6c757d; border-top: 1px solid #dee2e6; margin-top: 30px; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand" href="../index.html">📚 Biblioteca</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="ver_usuarios.html">Ver</a></li>
                <li class="nav-item"><a class="nav-link" href="insertar_usuarios.html">Insertar</a></li>
                <li class="nav-item"><a class="nav-link" href="consultar_usuarios.html">Consultar</a></li>
                <li class="nav-item"><a class="nav-link" href="editar_usuarios.html">Editar</a></li>
                <li class="nav-item"><a class="nav-link" href="borrar_usuarios.html">Eliminar</a></li>
            </ul>
        </div>
    </div>
</nav>
<div class="header-section">
    <div style="font-size:40px;margin-bottom:10px;">➕</div>
    <h2>Insertar Usuario</h2>
    <p>Registrar un nuevo usuario en el sistema</p>
</div>
<div class="container mt-4">
    <div id="alerta"></div>
    <div class="card-form">
        <div class="section-label">👤 Datos del Usuario</div>
        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label">Usuario</label>
                <input type="text" class="form-control" id="usuario" placeholder="Ej: juan.perez1">
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label">Correo</label>
                <input type="email" class="form-control" id="correo" placeholder="correo@ejemplo.com">
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label">Nombre</label>
                <input type="text" class="form-control" id="nombre" placeholder="Ej: Juan">
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label">Apellido</label>
                <input type="text" class="form-control" id="apellido" placeholder="Ej: Pérez">
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" id="password" placeholder="Contraseña">
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label">Teléfono</label>
                <input type="text" class="form-control" id="telefono" placeholder="Ej: 3001234567">
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label">Estado</label>
                <select class="form-control" id="estado">
                    <option value="activo">Activo</option>
                    <option value="inactivo">Inactivo</option>
                </select>
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label">Rol</label>
                <select class="form-control" id="rol">
                    <option value="usuario">Usuario</option>
                    <option value="admin">Admin</option>
                </select>
            </div>
        </div>
        <button onclick="insertar()" class="btn-guardar btn">➕ Crear Usuario</button>
    </div>
</div>
<div class="footer">Aplicación desarrollada para el curso de Redes e Infraestructura 2026</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../config.js"></script>
<script>
    function insertar() {
        const usuario = document.getElementById("usuario").value.trim();
        const correo = document.getElementById("correo").value.trim();
        const nombre = document.getElementById("nombre").value.trim();
        const apellido = document.getElementById("apellido").value.trim();
        const password = document.getElementById("password").value.trim();
        const telefono = document.getElementById("telefono").value.trim();
        const estado = document.getElementById("estado").value;
        const rol = document.getElementById("rol").value;
        if (!usuario || !correo || !nombre || !apellido || !password) {
            showAlert("Completa todos los campos obligatorios", "warning"); return;
        }
        fetch(API_USUARIOS + "/usuarios", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ usuario, correo, nombre, apellido, password, telefono, estado, rol })
        })
        .then(r => r.json().then(d => {
            if (r.ok) {
                showAlert("✅ Usuario creado exitosamente", "success");
                ["usuario","correo","nombre","apellido","password","telefono"].forEach(id => document.getElementById(id).value = "");
            } else {
                showAlert("❌ " + (d.error || "Error al crear usuario"), "danger");
            }
        }))
        .catch(() => showAlert("❌ Error de conexión", "danger"));
    }
    function showAlert(msg, tipo) {
        document.getElementById("alerta").innerHTML = "<div class=\"alert alert-" + tipo + " alert-dismissible\">" + msg + "<button type=\"button\" class=\"btn-close\" data-bs-dismiss=\"alert\"></button></div>";
    }
</script>
</body>
</html>
