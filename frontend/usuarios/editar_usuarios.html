<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Editar Usuario - Biblioteca</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f4f8; font-family: Arial, sans-serif; }
        .navbar { background-color: #0d2137; }
        .navbar-brand { color: #c8a96e !important; font-weight: bold; }
        .nav-link { color: #89b4d8 !important; }
        .header-section { background-color: #0d2137; padding: 30px 20px; text-align: center; border-bottom: 2px solid #1a3a5c; }
        .header-section h2 { color: #c8a96e; font-size: 24px; }
        .header-section p { color: #89b4d8; font-size: 13px; margin: 0; }
        .card-form { background: white; border-radius: 12px; border: 1px solid #dee2e6; padding: 30px; }
        .section-label { font-size: 12px; font-weight: bold; color: #6c757d; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 2px solid #854f0b; }
        .form-label { font-size: 14px; font-weight: bold; color: #0d2137; }
        .btn-buscar { background-color: #0d2137; color: #c8a96e; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; }
        .btn-guardar { background-color: #854f0b; color: white; border: none; padding: 10px 30px; border-radius: 8px; font-weight: bold; }
        .footer { text-align: center; padding: 20px; font-size: 12px; color: #6c757d; border-top: 1px solid #dee2e6; margin-top: 30px; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand" href="../index.html">📚 Biblioteca</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="ver_usuarios.html">Ver</a></li>
                <li class="nav-item"><a class="nav-link" href="insertar_usuarios.html">Insertar</a></li>
                <li class="nav-item"><a class="nav-link" href="consultar_usuarios.html">Consultar</a></li>
                <li class="nav-item"><a class="nav-link" href="editar_usuarios.html">Editar</a></li>
                <li class="nav-item"><a class="nav-link" href="borrar_usuarios.html">Eliminar</a></li>
            </ul>
        </div>
    </div>
</nav>
<div class="header-section">
    <div style="font-size:40px;margin-bottom:10px;">✏️</div>
    <h2>Editar Usuario</h2>
    <p>Busca el usuario y modifica sus datos</p>
</div>
<div class="container mt-4">
    <div id="alerta"></div>
    <div class="card-form mb-4">
        <div class="section-label">🔎 Buscar Usuario</div>
        <div class="d-flex gap-2">
            <input type="text" class="form-control" id="buscar" placeholder="Ej: juan.perez1">
            <button onclick="cargar()" class="btn-buscar btn">Cargar datos</button>
        </div>
    </div>
    <div class="card-form d-none" id="form-editar">
        <div class="section-label">✏️ Editando: <span id="id-titulo"></span></div>
        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label">Usuario (no editable)</label>
                <input type="text" class="form-control bg-light" id="usuario" readonly>
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label">Correo</label>
                <input type="email" class="form-control" id="correo">
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label">Nombre</label>
                <input type="text" class="form-control" id="nombre">
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label">Apellido</label>
                <input type="text" class="form-control" id="apellido">
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label">Telefono</label>
                <input type="text" class="form-control" id="telefono">
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" id="password">
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label">Estado</label>
                <select class="form-control" id="estado">
                    <option value="activo">Activo</option>
                    <option value="inactivo">Inactivo</option>
                </select>
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label">Rol</label>
                <select class="form-control" id="rol">
                    <option value="usuario">Usuario</option>
                    <option value="admin">Admin</option>
                </select>
            </div>
        </div>
        <div class="d-flex gap-2 mt-2">
            <button onclick="actualizar()" class="btn-guardar btn">💾 Guardar cambios</button>
            <a href="ver_usuarios.html" class="btn btn-secondary">Cancelar</a>
        </div>
    </div>
</div>
<div class="footer">Aplicación desarrollada para el curso de Redes e Infraestructura 2026</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../config.js"></script>
<script>
    let usuarioKey = null;
    function cargar() {
        const u = document.getElementById("buscar").value.trim();
        if (!u) { showAlert("Ingresa un nombre de usuario", "warning"); return; }
        fetch(API_USUARIOS + "/usuarios/" + u)
            .then(r => { if (!r.ok) throw new Error(); return r.json(); })
            .then(d => {
                usuarioKey = d.usuario;
                document.getElementById("id-titulo").textContent = d.usuario;
                document.getElementById("usuario").value = d.usuario;
                document.getElementById("correo").value = d.correo || "";
                document.getElementById("nombre").value = d.nombre || "";
                document.getElementById("apellido").value = d.apellido || "";
                document.getElementById("telefono").value = d.telefono || "";
                document.getElementById("password").value = d.password || "";
                document.getElementById("estado").value = d.estado || "activo";
                document.getElementById("rol").value = d.rol || "usuario";
                document.getElementById("form-editar").classList.remove("d-none");
                document.getElementById("alerta").innerHTML = "";
            })
            .catch(() => { document.getElementById("form-editar").classList.add("d-none"); showAlert("❌ Usuario no encontrado", "danger"); });
    }
    function actualizar() {
        const body = {
            nombre: document.getElementById("nombre").value,
            apellido: document.getElementById("apellido").value,
            correo: document.getElementById("correo").value,
            telefono: document.getElementById("telefono").value,
            password: document.getElementById("password").value,
            estado: document.getElementById("estado").value,
            rol: document.getElementById("rol").value
        };
        fetch(API_USUARIOS + "/usuarios/" + usuarioKey, { method: "PUT", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) })
            .then(r => r.json().then(d => { showAlert(r.ok ? "✅ " + (d.mensaje || "Actualizado correctamente") : "❌ " + (d.error || "Error al actualizar"), r.ok ? "success" : "danger"); }))
            .catch(() => showAlert("❌ Error de conexion", "danger"));
    }
    function showAlert(msg, tipo) {
        document.getElementById("alerta").innerHTML = "<div class=\"alert alert-" + tipo + " alert-dismissible\">" + msg + "<button type=\"button\" class=\"btn-close\" data-bs-dismiss=\"alert\"></button></div>";
    }
</script>
</body>
</html>
