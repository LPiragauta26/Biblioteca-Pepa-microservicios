<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Devoluciones - Biblioteca</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f4f8; font-family: Arial, sans-serif; }
        .navbar { background-color: #0d2137; }
        .navbar-brand { color: #c8a96e !important; font-weight: bold; }
        .nav-link { color: #89b4d8 !important; }
        .hero { background-color: #0d2137; padding: 30px 20px; text-align: center; border-bottom: 2px solid #1a3a5c; }
        .hero h1 { color: #c8a96e; font-size: 24px; margin: 0; }
        .hero p { color: #89b4d8; font-size: 14px; margin: 6px 0 0; }
        .card-prestamo { background: white; border-radius: 10px; border: 1px solid #dee2e6; padding: 18px; margin-bottom: 12px; border-left: 4px solid #185fa5; }
        .card-prestamo.vencido { border-left-color: #a32d2d; }
        .badge-activo  { background-color: #185fa5; color: white; padding: 3px 10px; border-radius: 20px; font-size: 12px; }
        .badge-vencido { background-color: #a32d2d; color: white; padding: 3px 10px; border-radius: 20px; font-size: 12px; }
        .badge-tipo { background-color: #0d2137; color: #c8a96e; padding: 3px 10px; border-radius: 20px; font-size: 12px; }
        .multa-box { background: #fff3cd; border: 1px solid #ffc107; border-radius: 8px; padding: 8px 12px; font-size: 13px; margin-top: 8px; }
        .footer { text-align: center; padding: 20px; font-size: 12px; color: #6c757d; border-top: 1px solid #dee2e6; margin-top: 30px; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand" href="../Panel-admin.html">📚 Biblioteca — Admin</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="../Panel-admin.html">← Volver al Panel</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="hero">
    <div style="font-size:40px;margin-bottom:8px;">📤</div>
    <h1>Devoluciones Pendientes</h1>
    <p>Confirma la recepción física del libro para cerrar el préstamo</p>
</div>

<div class="container mt-4">
    <div id="alerta-global"></div>
    <div class="d-flex justify-content-between align-items-center mb-3">
        <span style="font-size:13px;color:#6c757d;" id="total-devoluciones">Cargando...</span>
        <button onclick="cargar()" class="btn btn-sm" style="background:#0d2137;color:#c8a96e;">🔄 Actualizar</button>
    </div>
    <div id="lista"></div>
</div>

<div class="footer">Aplicación desarrollada para el curso de Redes e Infraestructura 2026</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../config.js"></script>
    <script>

    function cargar() {
        document.getElementById('lista').innerHTML = '<div class="text-center text-muted py-4">Cargando...</div>';
        fetch(API_PRESTAMOS + '/prestamos/solicitudes-devolucion')
            .then(r => r.json())
            .then(data => {
                document.getElementById('total-devoluciones').textContent = data.length + ' devolución(es) por confirmar';
                if (!data.length) {
                    document.getElementById('lista').innerHTML = `
                        <div class="text-center text-muted py-5">
                            <div style="font-size:50px;">✅</div>
                            <p>No hay devoluciones pendientes de confirmar.</p>
                        </div>`;
                    return;
                }

                document.getElementById('lista').innerHTML = data.map(p => {
                    const esVencido  = p.estado === 'vencido';
                    const badgeClass = esVencido ? 'badge-vencido' : 'badge-activo';
                    const cardClass  = esVencido ? 'vencido' : '';
                    const multaHtml  = esVencido && p.multa_valor > 0
                        ? `<div class="multa-box">⚠️ <strong>Multa acumulada:</strong> $${Number(p.multa_valor).toLocaleString()} — al confirmar quedará como pagada</div>`
                        : '';

                    return `
                    <div class="card-prestamo ${cardClass}">
                        <div class="d-flex justify-content-between align-items-start mb-2">
                            <div>
                                <div style="font-size:15px;font-weight:bold;color:#0d2137;">📗 ${p.titulo_libro}</div>
                                <div style="font-size:13px;color:#6c757d;">Código: ${p.codigo_libro} &nbsp;|&nbsp; <span class="badge-tipo">${p.tipo_prestamo}</span></div>
                            </div>
                            <span class="${badgeClass}">${p.estado}</span>
                        </div>
                        <div class="row mb-2" style="font-size:13px;">
                            <div class="col-md-4"><strong>Usuario:</strong> ${p.usuario}</div>
                            <div class="col-md-4"><strong>Nombre:</strong> ${p.nombre_usuario}</div>
                            <div class="col-md-4"><strong>Email:</strong> ${p.email_usuario}</div>
                            <div class="col-md-4 mt-1"><strong>ID préstamo:</strong> #${p.id}</div>
                            <div class="col-md-4 mt-1"><strong>Préstamo:</strong> ${formatFecha(p.fecha_prestamo)}</div>
                            <div class="col-md-4 mt-1"><strong>Vencía:</strong> ${formatFecha(p.fecha_devolucion)}</div>
                        </div>
                        ${multaHtml}
                        <div class="d-flex gap-2 mt-3">
                            <button onclick="confirmar(${p.id})" class="btn btn-sm btn-success">📥 Confirmar recepción física</button>
                            <button onclick="anular(${p.id})" class="btn btn-sm btn-outline-danger">🚫 Anular préstamo</button>
                        </div>
                    </div>`;
                }).join('');
            })
            .catch(() => showGlobal('❌ Error al cargar devoluciones', 'danger'));
    }

    async function confirmar(id) {
        if (!confirm('¿Confirmas que recibiste el libro físicamente? El stock se restaurará.')) return;
        try {
            const res  = await fetch(API_PRESTAMOS + '/prestamos/' + id + '/confirmar-devolucion', { method: 'PUT' });
            const data = await res.json();
            showGlobal(res.ok ? '✅ ' + data.mensaje : '❌ ' + data.error, res.ok ? 'success' : 'danger');
            if (res.ok) cargar();
        } catch { showGlobal('❌ Error de conexión', 'danger'); }
    }

    async function anular(id) {
        if (!confirm('¿Anular este prestamo? El stock se restaurara.')) return;
        try {
            const res  = await fetch(API_PRESTAMOS + '/prestamos/' + id + '/anular', { method: 'PUT' });
            const data = await res.json();
            showGlobal(res.ok ? '✅ ' + data.mensaje : '❌ ' + data.error, res.ok ? 'success' : 'danger');
            if (res.ok) cargar();
        } catch { showGlobal('❌ Error de conexion', 'danger'); }
    }

    function formatFecha(f) {
        if (!f) return '—';
        return new Date(f).toLocaleString('es-CO', { dateStyle:'short', timeStyle:'short' });
    }

    function showGlobal(msg, tipo) {
        document.getElementById('alerta-global').innerHTML = `<div class="alert alert-${tipo} alert-dismissible">${msg}<button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>`;
    }

    cargar();
</script>
</body>
</html>
