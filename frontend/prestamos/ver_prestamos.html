<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Ver Prestamos - Biblioteca</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f4f8; font-family: Arial, sans-serif; }
        .navbar { background-color: #0d2137; }
        .navbar-brand { color: #c8a96e !important; font-weight: bold; }
        .nav-link { color: #89b4d8 !important; }
        .header-section { background-color: #0d2137; padding: 30px 20px; text-align: center; border-bottom: 2px solid #1a3a5c; }
        .header-section h2 { color: #c8a96e; font-size: 24px; }
        .header-section p { color: #89b4d8; font-size: 13px; margin: 0; }
        .badge-pendiente { background-color: #185fa5; color: white; padding: 4px 10px; border-radius: 20px; font-size: 12px; }
        .badge-vencido { background-color: #a32d2d; color: white; padding: 4px 10px; border-radius: 20px; font-size: 12px; }
        .badge-devuelto { background-color: #3b6d11; color: white; padding: 4px 10px; border-radius: 20px; font-size: 12px; }
        .badge-tipo { background-color: #0d2137; color: #c8a96e; padding: 4px 10px; border-radius: 20px; font-size: 12px; }
        .card-prestamo { background: white; border-radius: 10px; border: 1px solid #dee2e6; padding: 16px; margin-bottom: 12px; border-left: 4px solid #0d2137; }
        .card-prestamo .titulo { font-size: 15px; font-weight: bold; color: #0d2137; margin-bottom: 4px; }
        .card-prestamo .subtitulo { font-size: 13px; color: #6c757d; margin-bottom: 8px; }
        .card-prestamo .detalle { font-size: 13px; color: #444; }
        .footer { text-align: center; padding: 20px; font-size: 12px; color: #6c757d; border-top: 1px solid #dee2e6; margin-top: 30px; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand" href="../index.html">Biblioteca</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="ver_prestamos.html">Ver Prestamos</a></li>
                <li class="nav-item"><a class="nav-link" href="insertar_prestamos.html">Insertar</a></li>
                <li class="nav-item"><a class="nav-link" href="consultar_prestamos.html">Consultar</a></li>
                <li class="nav-item"><a class="nav-link" href="editar_prestamos.html">Editar</a></li>
                <li class="nav-item"><a class="nav-link" href="borrar_prestamos.html">Eliminar</a></li>
            </ul>
        </div>
    </div>
</nav>
<div class="header-section">
    <div style="font-size:40px;margin-bottom:10px;">📋</div>
    <h2>Lista de Prestamos</h2>
    <p>Prestamos pendientes del sistema</p>
</div>
<div class="container mt-4">
    <div class="row mb-4" id="resumen"></div>
    <div id="prestamos-lista"></div>
    <div id="mensaje-vacio" class="text-center text-muted py-4 d-none">
        <div style="font-size:40px;">📭</div>
        <p>No hay prestamos registrados.</p>
    </div>
    <div class="text-center mt-3">
        <a href="index.html" class="btn btn-secondary">Volver al inicio</a>
    </div>
</div>
<div class="footer">Aplicacion desarrollada para el curso de Redes e Infraestructura 2026</div>
<script src="../config.js"></script>
<script>
    Promise.all([
        fetch(API_PRESTAMOS + "/prestamos/pendientes").then(r => r.json()),
        fetch(API_PRESTAMOS + "/prestamos/conteos").then(r => r.json())
    ]).then(function(results) {
        var data = results[0];
        var conteos = results[1];
        var lista = document.getElementById("prestamos-lista");
        var mensajeVacio = document.getElementById("mensaje-vacio");
        var resumen = document.getElementById("resumen");

        if (!Array.isArray(data) || data.length === 0) {
            mensajeVacio.classList.remove("d-none");
            return;
        }

        var pendientes = data.length;
        var vencidos = conteos ? conteos.vencidos : 0;
        var devoluciones = conteos ? conteos.devoluciones : 0;

        resumen.innerHTML =
            "<div class=\"col-md-4 mb-2\"><div class=\"text-center p-3 bg-white rounded border\">" +
            "<div style=\"font-size:24px;font-weight:bold;color:#185fa5;\">" + pendientes + "</div>" +
            "<div style=\"font-size:13px;color:#6c757d;\">Pendientes</div></div></div>" +
            "<div class=\"col-md-4 mb-2\"><div class=\"text-center p-3 bg-white rounded border\">" +
            "<div style=\"font-size:24px;font-weight:bold;color:#a32d2d;\">" + vencidos + "</div>" +
            "<div style=\"font-size:13px;color:#6c757d;\">Vencidos</div></div></div>" +
            "<div class=\"col-md-4 mb-2\"><div class=\"text-center p-3 bg-white rounded border\">" +
            "<div style=\"font-size:24px;font-weight:bold;color:#3b6d11;\">" + devoluciones + "</div>" +
            "<div style=\"font-size:13px;color:#6c757d;\">Devoluciones pendientes</div></div></div>";

        data.forEach(function(prestamo) {
            var card = document.createElement("div");
            card.className = "card-prestamo";
            card.innerHTML =
                "<div class=\"d-flex justify-content-between align-items-start mb-2\">" +
                "<div><div class=\"titulo\">📗 " + prestamo.titulo_libro + "</div>" +
                "<div class=\"subtitulo\">Codigo: " + prestamo.codigo_libro + " | <span class=\"badge-tipo\">" + prestamo.tipo_prestamo + "</span></div></div>" +
                "<span class=\"badge-pendiente\">Pendiente</span></div>" +
                "<div class=\"row detalle\">" +
                "<div class=\"col-md-4\"><strong>Usuario:</strong> " + prestamo.usuario + "<br>" +
                "<strong>Nombre:</strong> " + prestamo.nombre_usuario + "<br>" +
                "<strong>Email:</strong> " + prestamo.correo_usuario + "</div>" +
                "<div class=\"col-md-4\"><strong>Fecha prestamo:</strong> " + (prestamo.fecha_prestamo||"").substring(0,10) + "<br>" +
                "<strong>Fecha devolucion:</strong> " + (prestamo.fecha_devolucion||"").substring(0,10) + "</div>" +
                "<div class=\"col-md-4 text-md-end\"><strong>ID:</strong> #" + prestamo.id + "</div></div>";
            lista.appendChild(card);
        });
    }).catch(function(e) {
        console.error("Error:", e);
    });
</script>
</body>
</html>
