<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Ver Préstamos - Biblioteca</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f4f8; font-family: Arial, sans-serif; }
        .navbar { background-color: #0d2137; }
        .navbar-brand { color: #c8a96e !important; font-weight: bold; }
        .nav-link { color: #89b4d8 !important; }
        .nav-link:hover { color: #c8a96e !important; }
        .header-section { background-color: #0d2137; padding: 30px 20px; text-align: center; border-bottom: 2px solid #1a3a5c; }
        .header-section h2 { color: #c8a96e; font-size: 24px; }
        .header-section p { color: #89b4d8; font-size: 13px; margin: 0; }
        .badge-activo { background-color: #185fa5; color: white; padding: 4px 10px; border-radius: 20px; font-size: 12px; }
        .badge-vencido { background-color: #a32d2d; color: white; padding: 4px 10px; border-radius: 20px; font-size: 12px; }
        .badge-devuelto { background-color: #3b6d11; color: white; padding: 4px 10px; border-radius: 20px; font-size: 12px; }
        .badge-tipo { background-color: #0d2137; color: #c8a96e; padding: 4px 10px; border-radius: 20px; font-size: 12px; }
        .table thead { background-color: #0d2137; color: #c8a96e; }
        .table tbody tr:hover { background-color: #e8f0f8; }
        .table td { vertical-align: middle; font-size: 14px; }
        .card-prestamo { background: white; border-radius: 10px; border: 1px solid #dee2e6; padding: 16px; margin-bottom: 12px; border-left: 4px solid #0d2137; }
        .card-prestamo.vencido { border-left-color: #a32d2d; }
        .card-prestamo.devuelto { border-left-color: #3b6d11; }
        .card-prestamo .titulo { font-size: 15px; font-weight: bold; color: #0d2137; margin-bottom: 4px; }
        .card-prestamo .subtitulo { font-size: 13px; color: #6c757d; margin-bottom: 8px; }
        .card-prestamo .detalle { font-size: 13px; color: #444; }
        .footer { text-align: center; padding: 20px; font-size: 12px; color: #6c757d; border-top: 1px solid #dee2e6; margin-top: 30px; }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="../index.html">📚 Biblioteca</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="ver_prestamos.html">Ver Préstamos</a></li>
                    <li class="nav-item"><a class="nav-link" href="insertar_prestamos.html">Insertar</a></li>
                    <li class="nav-item"><a class="nav-link" href="consultar_prestamos.html">Consultar</a></li>
                    <li class="nav-item"><a class="nav-link" href="editar_prestamos.html">Editar</a></li>
                    <li class="nav-item"><a class="nav-link" href="borrar_prestamos.html">Eliminar</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Header -->
    <div class="header-section">
        <div style="font-size: 40px; margin-bottom: 10px;">📋</div>
        <h2>Lista de Préstamos</h2>
        <p>Todos los préstamos registrados en el sistema</p>
    </div>

    <!-- Contenido -->
    <div class="container mt-4">

        <!-- Resumen rápido -->
        <div class="row mb-4" id="resumen"></div>

        <!-- Cards de préstamos -->
        <div id="prestamos-lista"></div>

        <div id="mensaje-vacio" class="text-center text-muted py-4 d-none">
            <div style="font-size: 40px;">📭</div>
            <p>No hay préstamos registrados aún.</p>
        </div>

        <div class="text-center mt-3">
            <a href="index.html" class="btn btn-secondary">← Volver al inicio</a>
        </div>
    </div>

    <div class="footer">
        Aplicación desarrollada para el curso de Redes e Infraestructura 2026
    </div>

    <script>
        fetch('' + API_PRESTAMOS + '/prestamos')
            .then(response => response.json())
            .then(data => {
                const lista = document.getElementById('prestamos-lista');
                const mensajeVacio = document.getElementById('mensaje-vacio');
                const resumen = document.getElementById('resumen');

                if (data.length === 0) {
                    mensajeVacio.classList.remove('d-none');
                    return;
                }

                // Contar estados
                const activos = data.filter(p => p.estado === 'activo').length;
                const vencidos = data.filter(p => p.estado === 'vencido').length;
                const devueltos = data.filter(p => p.estado === 'devuelto').length;

                resumen.innerHTML = `
                    <div class="col-md-4 mb-2">
                        <div class="text-center p-3 bg-white rounded border">
                            <div style="font-size:24px; font-weight:bold; color:#185fa5;">${activos}</div>
                            <div style="font-size:13px; color:#6c757d;">Activos</div>
                        </div>
                    </div>
                    <div class="col-md-4 mb-2">
                        <div class="text-center p-3 bg-white rounded border">
                            <div style="font-size:24px; font-weight:bold; color:#a32d2d;">${vencidos}</div>
                            <div style="font-size:13px; color:#6c757d;">Vencidos</div>
                        </div>
                    </div>
                    <div class="col-md-4 mb-2">
                        <div class="text-center p-3 bg-white rounded border">
                            <div style="font-size:24px; font-weight:bold; color:#3b6d11;">${devueltos}</div>
                            <div style="font-size:13px; color:#6c757d;">Devueltos</div>
                        </div>
                    </div>
                `;

                // Mostrar cards
                data.forEach(prestamo => {
                    let badgeEstado = '';
                    let claseCard = '';
                    if (prestamo.estado === 'activo') { badgeEstado = `<span class="badge-activo">Activo</span>`; }
                    if (prestamo.estado === 'vencido') { badgeEstado = `<span class="badge-vencido">Vencido</span>`; claseCard = 'vencido'; }
                    if (prestamo.estado === 'devuelto') { badgeEstado = `<span class="badge-devuelto">Devuelto</span>`; claseCard = 'devuelto'; }

                    const card = document.createElement('div');
                    card.className = `card-prestamo ${claseCard}`;
                    card.innerHTML = `
                        <div class="d-flex justify-content-between align-items-start mb-2">
                            <div>
                                <div class="titulo">📗 ${prestamo.titulo_libro}</div>
                                <div class="subtitulo">Código: ${prestamo.codigo_libro} &nbsp;|&nbsp; <span class="badge-tipo">${prestamo.tipo_prestamo}</span></div>
                            </div>
                            <div>${badgeEstado}</div>
                        </div>
                        <div class="row detalle">
                            <div class="col-md-4">
                                <strong>👤 Usuario:</strong> ${prestamo.usuario}<br>
                                <strong>Nombre:</strong> ${prestamo.nombre_usuario}<br>
                                <strong>Email:</strong> ${prestamo.email_usuario}
                            </div>
                            <div class="col-md-4">
                                <strong>📅 Fecha préstamo:</strong> ${prestamo.fecha_prestamo}<br>
                                <strong>📅 Fecha devolución:</strong> ${prestamo.fecha_devolucion}
                            </div>
                            <div class="col-md-4 text-md-end">
                                <strong>ID:</strong> #${prestamo.id}
                            </div>
                        </div>
                    `;
                    lista.appendChild(card);
                });
            })
            .catch(error => {
                console.error('Error:', error);
            });
    </script>

<script src="../config.js"></script>
</body>
</html>
