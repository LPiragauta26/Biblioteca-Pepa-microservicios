<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Solicitudes Pendientes - Biblioteca</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f4f8; font-family: Arial, sans-serif; }
        .navbar { background-color: #0d2137; }
        .navbar-brand { color: #c8a96e !important; font-weight: bold; }
        .nav-link { color: #89b4d8 !important; }
        .hero { background-color: #0d2137; padding: 30px 20px; text-align: center; border-bottom: 2px solid #1a3a5c; }
        .hero h1 { color: #c8a96e; font-size: 24px; margin: 0; }
        .hero p { color: #89b4d8; font-size: 14px; margin: 6px 0 0; }
        .card-prestamo { background: white; border-radius: 10px; border: 1px solid #dee2e6; padding: 18px; margin-bottom: 12px; border-left: 4px solid #854f0b; }
        .badge-pendiente { background-color: #854f0b; color: white; padding: 3px 10px; border-radius: 20px; font-size: 12px; }
        .badge-tipo { background-color: #0d2137; color: #c8a96e; padding: 3px 10px; border-radius: 20px; font-size: 12px; }
        .footer { text-align: center; padding: 20px; font-size: 12px; color: #6c757d; border-top: 1px solid #dee2e6; margin-top: 30px; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand" href="../Panel-admin.html">📚 Biblioteca — Admin</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="../Panel-admin.html">← Volver al Panel</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="hero">
    <div style="font-size:40px;margin-bottom:8px;">⏳</div>
    <h1>Solicitudes Pendientes</h1>
    <p>Aprueba o rechaza las solicitudes de préstamo</p>
</div>

<div class="container mt-4">
    <div id="alerta-global"></div>
    <div class="d-flex justify-content-between align-items-center mb-3">
        <span style="font-size:13px;color:#6c757d;" id="total-pendientes">Cargando...</span>
        <button onclick="cargar()" class="btn btn-sm" style="background:#0d2137;color:#c8a96e;">🔄 Actualizar</button>
    </div>
    <div id="lista"></div>
</div>

<div class="footer">Aplicación desarrollada para el curso de Redes e Infraestructura 2026</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="../config.js"></script>
    <script>

    function cargar() {
        document.getElementById('lista').innerHTML = '<div class="text-center text-muted py-4">Cargando...</div>';
        fetch(API_PRESTAMOS + '/prestamos/pendientes')
            .then(r => r.json())
            .then(data => {
                document.getElementById('total-pendientes').textContent = data.length + ' solicitud(es) pendiente(s)';
                if (!data.length) {
                    document.getElementById('lista').innerHTML = `
                        <div class="text-center text-muted py-5">
                            <div style="font-size:50px;">✅</div>
                            <p>No hay solicitudes pendientes.</p>
                        </div>`;
                    return;
                }
                document.getElementById('lista').innerHTML = data.map(p => `
                    <div class="card-prestamo">
                        <div class="d-flex justify-content-between align-items-start mb-2">
                            <div>
                                <div style="font-size:15px;font-weight:bold;color:#0d2137;">📗 ${p.titulo_libro}</div>
                                <div style="font-size:13px;color:#6c757d;">Código: ${p.codigo_libro} &nbsp;|&nbsp; <span class="badge-tipo">${p.tipo_prestamo}</span></div>
                            </div>
                            <span class="badge-pendiente">pendiente</span>
                        </div>
                        <div class="row mb-3" style="font-size:13px;">
                            <div class="col-md-4"><strong>Usuario:</strong> ${p.usuario}</div>
                            <div class="col-md-4"><strong>Nombre:</strong> ${p.nombre_usuario}</div>
                            <div class="col-md-4"><strong>Email:</strong> ${p.email_usuario}</div>
                            <div class="col-md-4 mt-1"><strong>ID préstamo:</strong> #${p.id}</div>
                            <div class="col-md-4 mt-1"><strong>Solicitado:</strong> ${formatFecha(p.fecha_prestamo)}</div>
                            <div class="col-md-4 mt-1"><strong>Vence en:</strong> ${formatFecha(p.fecha_devolucion)}</div>
                        </div>
                        <div class="d-flex gap-2">
                            <button onclick="aprobar(${p.id})" class="btn btn-sm btn-success">✅ Aprobar</button>
                            <button onclick="rechazar(${p.id})" class="btn btn-sm btn-danger">❌ Rechazar</button>
                        </div>
                    </div>`).join('');
            })
            .catch(() => showGlobal('❌ Error al cargar solicitudes', 'danger'));
    }

    async function aprobar(id) {
        if (!confirm('¿Aprobar este préstamo? El stock del libro se descontará.')) return;
        try {
            const res  = await fetch(API_PRESTAMOS + '/prestamos/' + id + '/aprobar', { method: 'PUT' });
            const data = await res.json();
            showGlobal(res.ok ? '✅ ' + data.mensaje : '❌ ' + data.error, res.ok ? 'success' : 'danger');
            if (res.ok) cargar();
        } catch { showGlobal('❌ Error de conexión', 'danger'); }
    }

    async function rechazar(id) {
        if (!confirm('¿Rechazar esta solicitud?')) return;
        try {
            const res  = await fetch(API_PRESTAMOS + '/prestamos/' + id + '/rechazar', { method: 'PUT' });
            const data = await res.json();
            showGlobal(res.ok ? '✅ ' + data.mensaje : '❌ ' + data.error, res.ok ? 'success' : 'danger');
            if (res.ok) cargar();
        } catch { showGlobal('❌ Error de conexión', 'danger'); }
    }

    function formatFecha(f) {
        if (!f) return '—';
        return new Date(f).toLocaleString('es-CO', { dateStyle:'short', timeStyle:'short' });
    }

    function showGlobal(msg, tipo) {
        document.getElementById('alerta-global').innerHTML = `<div class="alert alert-${tipo} alert-dismissible">${msg}<button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>`;
    }

    cargar();
</script>
</body>
</html>
